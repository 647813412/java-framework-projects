#服务配置：项目启动的端口号和访问地址前缀
server:
  port: 8080
  servlet:
    context-path: /api
    session:
      cookie:
        #30天过期
        max-age: 2592000
#项目名称、数据库配
spring:
  # 空间图片分表
  shardingsphere:
    datasource:
      names: picture
      picture:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:picture}
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD:}
    rules:
      sharding:
        tables:
          picture:
            actual-data-nodes: picture.picture  # 动态分表
            table-strategy:
              standard:
                sharding-column: spaceId
                sharding-algorithm-name: picture_sharding_algorithm  # 使用自定义分片算法
        sharding-algorithms:
          picture_sharding_algorithm:
            type: CLASS_BASED
            props:
              strategy: standard
              algorithmClassName: com.wuyou.youpicturebackend.manager.sharding.PictureShardingAlgorithm
    props:
      sql-show: true
  application:
    name: you-picture-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:picture}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 10MB
  redis:
    database: 0
    host: 127.0.0.1
    port: 6379
    timeout: 5000
  session:
    store-type: redis
    timeout:  2592000   #30天过期
mybatis-plus:
  configuration:
    #仅在开发环境开启日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    #关闭MyBatis-Plus的自动驼峰命名转换功能,默认开启
    map-underscore-to-camel-case: false
  global-config:
    enable-sql-runner: true
    db-config:
      logic-delete-field: deleted # 全局逻辑删除字段名(deleted为实体类属性名称)
      logic-delete-value: 1 # 逻辑已删除值。可选，默认值为 1
      logic-not-delete-value: 0 # 逻辑未删除值。可选，默认值为 0

# 安全配置
security:
  password:
    salt: ${PASSWORD_SALT:wuyou}
  default-password: ${DEFAULT_PASSWORD:12345678}

# 接口文档配置
knife4j:
  enable: true
  openapi:
    title: "接口文档"
    version: 1.0
    group:
      default:
#        api-rule: package
        api-rule-resources:
          - com.wuyou.youpicturebackend.controller